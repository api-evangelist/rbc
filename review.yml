actions:
  openapiPath: null
  reason: |
    No public OpenAPI/Swagger definition is downloadable from RBC's developer
    portal or business API page; both are HTML/SPA only and the Business
    Banking suite is advisor-onboarded. Identity plus honest documented-API
    pointers were captured; no spec could be harvested verbatim.
