name: Royal Bank of Canada
kind: company
description: >-
  Royal Bank of Canada (RBC) is Canada's largest bank by market capitalization and one of the
  country's Big Six, a Schedule I domestic bank chartered under the federal Bank Act and publicly
  traded (TSX/NYSE: RY) with headquarters in Toronto. RBC serves personal, commercial, wealth,
  capital-markets, and insurance clients in Canada, the U.S., and internationally. It was the first
  Canadian bank to launch a public API developer portal (developer.rbc.com — the "RBC External
  Developer Portal"), which offers self-serve informational/utility APIs (branch locator, credit
  card catalog, mortgage down-payment and amortization calculators) alongside a partner-gated
  Business Banking API suite for corporate treasury integration (RBC Move Money via Interac
  e-Transfer, RBC Pay, and Balance/Transactions, Tracking, and Validation APIs). RBC exposes no
  first-party open-banking consumer-data API; consumer data sharing today is aggregator-based via
  bilateral agreements (e.g. Plaid, Yodlee). Canada's federal Consumer-Driven Banking framework
  (Budget 2024 / Fall Economic Statement 2024, overseen by the FCAC) is legislated but not yet
  operational, so open finance in Canada remains voluntary and fragmented.
